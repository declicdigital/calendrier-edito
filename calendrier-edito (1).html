  }
  .header-meta {

    position: relative;

  .stat-item:hover { background: var(--surface); }

    bottom: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-item[data-p="twitter"].active::after { background: var(--tw); }
  .stat-item[data-p="video"].active::after { background: var(--ig); }
  .stat-item[data-p="blog"].active::after { background: var(--bl); }
  .stat-n {
    font-family: 'Fraunces', serif;
    font-size: 1.8rem;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-item[data-p="twitter"] .stat-n { color: var(--tw); }

const WEEKS = [
  {label:'Semaine 1', days:[null,null,null,null,1,2,3,4]},
  {label:'Semaine 2', days:[5,6,7,8,9,10,11]},
  {label:'Semaine 3', days:[12,13,14,15,16,17,18]},
  {label:'Semaine 4', days:[19,20,21,22,23,24,25]},
  {label:'Semaine 5', days:[26,27,28,29,30,31,null]},
];

let activeFilter = 'all';
let activeDay = null;

function getPostsForDay(day) {
  const posts = [];
  const li = data.linkedin.find(x=>x.d===day);
  if(li) posts.push({platform:'linkedin', cls:'p-linkedin', badge:'badge-li', label:'LinkedIn', ...li});
  data.twitter.filter(x=>x.d===day).forEach(t => posts.push({platform:'twitter', cls:'p-twitter', badge:'badge-tw', label:'X / Twitter', ...t}));
  const vid = data.video.find(x=>x.d===day);
  if(vid) posts.push({platform:'video', cls:'p-video', badge:'badge-vid', label:'Instagram & TikTok', ...vid});
  const bl = data.blog.find(x=>x.d===day);
  if(bl) posts.push({platform:'blog', cls:'p-blog', badge:'badge-bl', label:'Blog', ...bl});
  return posts;
}

function hasPlatform(day, platform) {
  if(platform==='all') return getPostsForDay(day).length > 0;
  const p = platform;
  return getPostsForDay(day).some(post => post.platform === p || (p === 'video' && post.platform === 'video'));
}

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  const today = new Date();
  const isToday = (d) => today.getFullYear()===2026 && today.getMonth()===4 && today.getDate()===d;

  WEEKS.forEach(week => {
    const wDiv = document.createElement('div');
    wDiv.className = 'sidebar-week';
    wDiv.innerHTML = `<div class="sidebar-week-label">${week.label}</div>`;
    sidebar.appendChild(wDiv);

    week.days.forEach(d => {
      if(!d) return;
      const posts = getPostsForDay(d);
      const filtered = activeFilter==='all' ? posts : posts.filter(p=>p.platform===activeFilter || (activeFilter==='video' && p.platform==='video'));
      if(filtered.length===0 && activeFilter!=='all') return;

      const div = document.createElement('div');
      div.className = 'sidebar-day' + (activeDay===d?' active':'');
      div.onclick = () => { activeDay = d; buildSidebar(); buildContent(); };

      const dots = posts.map(p => {
        const cls = {linkedin:'dot-li',twitter:'dot-tw',video:'dot-ig',blog:'dot-bl'}[p.platform]||'';
        return `<div class="dot ${cls}"></div>`;
      }).join('');

      div.innerHTML = `
        <div class="sidebar-day-num">${d}${isToday(d)?'<span class="today-badge">auj.</span>':''}</div>
        <div class="sidebar-day-dots">${dots}</div>
        <div class="sidebar-day-count">${posts.length}</div>
      `;
      wDiv.appendChild(div);
    });
  });
}

function buildContent() {
  const panel = document.getElementById('content-panel');
  if(!activeDay) {
    panel.innerHTML = `<div class="empty-day"><div class="big">←</div><div>Sélectionne un jour</div></div>`;
    return;
  }

  const posts = getPostsForDay(activeDay);
  const filtered = activeFilter==='all' ? posts : posts.filter(p=>p.platform===activeFilter || (activeFilter==='video' && p.platform==='video'));
  const dayNames = ['','Vendredi','Samedi','Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

  panel.innerHTML = `
    <div class="day-header">
      <h2>${activeDay} mai 2026</h2>
      <div class="day-subline">${dayNames[activeDay]} · ${posts.length} publication${posts.length>1?'s':''}</div>
    </div>
    <div class="posts-grid" id="posts-grid"></div>
  `;

  const grid = document.getElementById('posts-grid');

  if(filtered.length===0) {
    grid.innerHTML = `<div class="empty-day" style="height:120px"><div>Aucun post pour cette plateforme ce jour.</div></div>`;
    return;
  }

  filtered.forEach((post, i) => {
    const card = document.createElement('div');
    card.className = `post-card ${post.cls}`;
    const slotLabel = post.slot ? ` · Post ${post.slot}` : '';
    card.innerHTML = `
      <div class="post-top">
        <span class="platform-badge ${post.badge}">${post.label}</span>
        <span class="post-slot">${slotLabel}</span>
        <span class="post-arrow">▼</span>
      </div>
      <div class="post-title">${post.t}</div>
      <div class="post-brief">${post.b}</div>
    `;
    card.onclick = () => card.classList.toggle('expanded');
    grid.appendChild(card);
  });
}

// Filters
document.querySelectorAll('.stat-item').forEach(el => {
  el.onclick = () => {
    document.querySelectorAll('.stat-item').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
    activeFilter = el.dataset.p;
    buildSidebar();
    buildContent();
  };
});

// Today display
const now = new Date();
document.getElementById('today-display').textContent =
  `${DAYS_FR[now.getDay()]} ${now.getDate()} ${MONTHS_FR[now.getMonth()]} ${now.getFullYear()}`;

// Auto-select today if in May 2026, else day 1
const autoDay = (now.getFullYear()===2026 && now.getMonth()===4) ? now.getDate() : 1;
activeDay = Math.min(Math.max(autoDay, 1), 31);

buildSidebar();
buildContent();
</script>
